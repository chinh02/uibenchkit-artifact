name: Publish tested backend image

on:
  push:
    branches:
      - codex/final-artifact-audit

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - name: Download tested image archive
        run: >-
          curl --fail --location --retry 3
          https://github.com/chinh02/uibenchkit-artifact/releases/download/v1.0.0-ase2026/uibenchkit-backend-v1.0.0-ase2026.tar.gz
          --output backend.tar.gz

      - name: Verify and load image
        run: |
          echo "db27a7598c3106ad9043bc223d1800783695e2ef1bb93572df4bf3bc4e609f6c  backend.tar.gz" | sha256sum --check
          gzip --decompress --stdout backend.tar.gz | docker load

      - name: Publish to GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GH_TOKEN}" | docker login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin
          docker push ghcr.io/chinh02/uibenchkit-backend:v1.0.0-ase2026
          docker logout ghcr.io
